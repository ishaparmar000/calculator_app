name: calculator_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  sqflite: ^2.4.2
  get: ^4.7.3
  fluttertoast: ^8.2.12
  get_storage: ^2.1.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1


  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: SFProBold
      fonts:
        - asset: assets/fonts/sf_pro_bold.OTF

    - family: SFProSemiBold
      fonts:
        - asset: assets/fonts/sf_pro_semibold.otf

    - family: SFProMedium
      fonts:
        - asset: assets/fonts/sf_pro_medium.OTF

    - family: SFProRegular
      fonts:
        - asset: assets/fonts/sf_pro_regular.OTF
